<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Helix Jump - Human vs AI</title>
  <style>
    :root {
      --bg: #f0f2f5;
      --panel: #ffffff;
      --text: #333333;
      --muted: #666666;
      --human: #4caf50;
      --ai: #2196f3;
      --danger: #e94560;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: auto;
      padding: 16px;
    }

    #app-shell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .app-logo {
      display: block;
      width: min(21vw, 126px);
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 6px 16px rgba(0, 0, 0, 0.18));
    }

    #main-container {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    .game-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      padding: 15px 20px;
      background: var(--panel);
      border-radius: 12px 12px 0 0;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      z-index: 10;
    }

    .player-label {
      font-size: 20px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .score-box {
      background: #f8f9fa;
      padding: 10px 20px;
      border-radius: 12px;
      box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.05);
      border: 2px solid #eee;
      display: flex;
      justify-content: center;
      align-items: center;
      min-width: 100px;
      height: 80px;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .score-display {
      font-size: 48px;
      font-weight: 900;
      color: var(--text);
      line-height: 1;
    }

    .player-label.human {
      color: var(--human);
    }

    .player-label.ai {
      color: var(--ai);
    }

    .score-box.human-lead {
      border-color: var(--human);
      background: #e8f5e9;
      transform: scale(1.2);
      box-shadow: 0 10px 20px rgba(76, 175, 80, 0.2);
    }

    .score-box.ai-lead {
      border-color: var(--ai);
      background: #e3f2fd;
      transform: scale(1.2);
      box-shadow: 0 10px 20px rgba(33, 150, 243, 0.2);
    }

    .score-box.losing {
      transform: scale(0.8);
      opacity: 0.7;
      background: #fafafa;
    }

    .game-container {
      width: 400px;
      height: 500px;
    }

    .game-canvas {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 0 0 8px 8px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
    }

    .round-status {
      width: 100%;
      max-width: 820px;
      display: flex;
      gap: 20px;
      align-items: stretch;
    }

    .game-status-card {
      flex: 1;
      display: none;
      background: var(--panel);
      border: 2px solid #e5e8ed;
      border-radius: 12px;
      padding: 14px 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    .game-status-card h2 {
      font-size: 22px;
      color: var(--danger);
      margin-bottom: 8px;
    }

    .game-status-card .final-score {
      font-size: 16px;
      color: var(--text);
    }

    .controls-info {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    .controls-info kbd {
      background: var(--text);
      color: #fff;
      padding: 4px 10px;
      border-radius: 4px;
      font-family: monospace;
      margin: 0 2px;
    }

    .start-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.95);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .start-screen h1 {
      font-size: 48px;
      color: var(--text);
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .difficulty-control {
      margin-bottom: 30px;
      width: 300px;
      text-align: center;
    }

    .difficulty-control label {
      display: block;
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #555;
    }

    .difficulty-control input[type="range"] {
      width: 100%;
      margin-bottom: 5px;
    }

    .difficulty-labels {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      color: #888;
    }

    .start-btn {
      background: linear-gradient(135deg, #2196f3, #21cbf3);
      border: none;
      color: white;
      padding: 15px 40px;
      font-size: 24px;
      font-weight: bold;
      border-radius: 30px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 5px 15px rgba(33, 150, 243, 0.3);
    }

    .start-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 20px rgba(33, 150, 243, 0.4);
    }

    @media (max-width: 900px) {
      #main-container {
        flex-direction: column;
      }

      .round-status {
        flex-direction: column;
      }

      .game-container {
        width: min(92vw, 400px);
        height: min(115vw, 500px);
      }
    }
  </style>
  <script type="module" crossorigin src="/assets/index-9i4M3BDB.js"></script>
</head>

<body>
  <div id="start-screen" class="start-screen">
    <h1>HELIX JUMP VS</h1>
    <div class="difficulty-control">
      <label for="ai-difficulty">AI Difficulty: <span id="difficulty-value">50</span></label>
      <input type="range" id="ai-difficulty" min="0" max="100" value="50">
      <div class="difficulty-labels">
        <span>Easy (Slow)</span>
        <span>Hard (Fast)</span>
      </div>
    </div>
    <button id="start-btn" class="start-btn">GAME START</button>
  </div>

  <div id="app-shell">
    <img class="app-logo" src="/assets/logo-DauEFXFu.png" alt="Helix Jump Logo" />

    <div id="main-container">
      <div class="game-wrapper">
        <div class="game-header">
          <span class="player-label human">Human</span>
          <div class="score-box" id="human-score-box">
            <span class="score-display" id="human-score">0</span>
          </div>
        </div>
        <div class="game-container">
          <canvas id="human-canvas" class="game-canvas"></canvas>
        </div>
      </div>

      <div class="game-wrapper">
        <div class="game-header">
          <span class="player-label ai">AI</span>
          <div class="score-box" id="ai-score-box">
            <span class="score-display" id="ai-score">0</span>
          </div>
        </div>
        <div class="game-container">
          <canvas id="ai-canvas" class="game-canvas"></canvas>
        </div>
      </div>
    </div>

    <section id="round-status" class="round-status">
      <div id="human-game-over" class="game-status-card">
        <h2>ROUND END</h2>
        <p class="final-score">Score: 0</p>
      </div>
      <div id="ai-game-over" class="game-status-card">
        <h2>ROUND END</h2>
        <p class="final-score">Score: 0</p>
      </div>
    </section>

    <div class="controls-info">
      Controls: <kbd>Q</kbd> rotate left / <kbd>E</kbd> rotate right
    </div>
  </div>

</body>

</html>
