<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Helix Jump</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0d0d1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
    }

    #game-container {
      position: relative;
      /* 가로 5 : 세로 3 비율 */
      aspect-ratio: 5 / 3;
      max-width: 100vw;
      max-height: 100vh;
    }

    #game-canvas {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 8px;
      box-shadow: 0 0 40px rgba(233, 69, 96, 0.3);
    }

    #score-ui {
      position: absolute;
      top: 20px;
      right: 20px;
      color: #fff;
      font-size: 24px;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
      z-index: 10;
    }

    #score-label {
      font-size: 14px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    #score-value {
      font-size: 48px;
      color: #e94560;
      transition: transform 0.1s ease;
    }

    #game-over-ui,
    #win-ui {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.85);
      padding: 40px 60px;
      border-radius: 16px;
      text-align: center;
      display: none;
      z-index: 20;
    }

    #game-over-ui h2 {
      color: #e94560;
      font-size: 36px;
      margin-bottom: 20px;
    }

    #win-ui h2 {
      color: #4CAF50;
      font-size: 36px;
      margin-bottom: 20px;
    }

    .restart-btn {
      background: linear-gradient(135deg, #e94560, #7b2cbf);
      border: none;
      color: white;
      padding: 15px 40px;
      font-size: 18px;
      border-radius: 30px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .restart-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4);
    }
  </style>
</head>

<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="score-ui">
      <div id="score-label">Score</div>
      <div id="score-value">0</div>
    </div>
    <div id="game-over-ui">
      <h2>GAME OVER</h2>
      <button class="restart-btn" onclick="location.reload()">다시 시작</button>
    </div>
    <div id="win-ui">
      <h2>🎉 CLEAR!</h2>
      <button class="restart-btn" onclick="location.reload()">다시 시작</button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
