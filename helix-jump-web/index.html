<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Helix Jump - Human vs AI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
    }

    #main-container {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    .game-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      padding: 15px 20px;
      background: white;
      border-radius: 12px 12px 0 0;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      z-index: 10;
    }

    .player-label {
      font-size: 20px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .score-box {
      background: #f8f9fa;
      padding: 10px 20px;
      border-radius: 12px;
      box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.05);
      border: 2px solid #eee;
      display: flex;
      justify-content: center;
      align-items: center;
      min-width: 100px;
      height: 80px;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .score-display {
      font-size: 48px;
      font-weight: 900;
      color: #333;
      line-height: 1;
    }

    .player-label.human {
      color: #4CAF50;
    }

    .player-label.ai {
      color: #2196F3;
    }

    .score-box.human-lead {
      border-color: #4CAF50;
      background: #e8f5e9;
      transform: scale(1.2);
      box-shadow: 0 10px 20px rgba(76, 175, 80, 0.2);
    }

    .score-box.ai-lead {
      border-color: #2196F3;
      background: #e3f2fd;
      transform: scale(1.2);
      box-shadow: 0 10px 20px rgba(33, 150, 243, 0.2);
    }

    .score-box.losing {
      transform: scale(0.8);
      opacity: 0.7;
      background: #fafafa;
    }

    .game-container {
      position: relative;
      width: 400px;
      height: 500px;
    }

    .game-canvas {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 0 0 8px 8px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
    }

    .game-over-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 255, 255, 0.95);
      padding: 30px 40px;
      border-radius: 16px;
      text-align: center;
      display: none;
      z-index: 200;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .game-over-overlay h2 {
      color: #e94560;
      font-size: 28px;
      margin-bottom: 10px;
    }

    .game-over-overlay .final-score {
      font-size: 18px;
      color: #333;
      margin-bottom: 15px;
    }

    .restart-btn {
      background: linear-gradient(135deg, #ff4757, #ff6b81);
      border: none;
      color: white;
      padding: 12px 30px;
      font-size: 16px;
      border-radius: 25px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .restart-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 20px rgba(255, 71, 87, 0.4);
    }

    .controls-info {
      margin-top: 20px;
      text-align: center;
      color: #666;
      font-size: 14px;
    }

    .controls-info kbd {
      background: #333;
      color: #fff;
      padding: 4px 10px;
      border-radius: 4px;
      font-family: monospace;
      margin: 0 2px;
    }

    /* 시작 화면 스타일 */
    .start-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.95);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .start-screen h1 {
      font-size: 48px;
      color: #333;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .difficulty-control {
      margin-bottom: 30px;
      width: 300px;
      text-align: center;
    }

    .difficulty-control label {
      display: block;
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #555;
    }

    .difficulty-control input[type="range"] {
      width: 100%;
      margin-bottom: 5px;
    }

    .difficulty-labels {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      color: #888;
    }

    .start-btn {
      background: linear-gradient(135deg, #2196F3, #21CBF3);
      border: none;
      color: white;
      padding: 15px 40px;
      font-size: 24px;
      font-weight: bold;
      border-radius: 30px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 5px 15px rgba(33, 150, 243, 0.3);
    }

    .start-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 20px rgba(33, 150, 243, 0.4);
    }
  </style>
</head>

<body>
  <!-- 시작 화면 -->
  <div id="start-screen" class="start-screen">
    <h1>HELIX JUMP VS</h1>
    <div class="difficulty-control">
      <label for="ai-difficulty">AI Difficulty: <span id="difficulty-value">50</span></label>
      <input type="range" id="ai-difficulty" min="0" max="100" value="50">
      <div class="difficulty-labels">
        <span>Easy (Slow)</span>
        <span>Hard (Fast)</span>
      </div>
    </div>
    <button id="start-btn" class="start-btn">GAME START</button>
  </div>

  <div id="main-container">
    <!-- 왼쪽: 사람 플레이어 -->
    <div class="game-wrapper">
      <div class="game-header">
        <span class="player-label human">👤 Human</span>
        <div class="score-box" id="human-score-box">
          <span class="score-display" id="human-score">0</span>
        </div>
      </div>
      <div class="game-container">
        <canvas id="human-canvas" class="game-canvas"></canvas>
        <div class="game-over-overlay" id="human-game-over">
          <h2>GAME OVER</h2>
          <p class="final-score">점수: 0</p>
          <button class="restart-btn" onclick="location.reload()">다시 시작</button>
        </div>
      </div>
    </div>

    <!-- 오른쪽: AI 플레이어 -->
    <div class="game-wrapper">
      <div class="game-header">
        <span class="player-label ai">🤖 AI</span>
        <div class="score-box" id="ai-score-box">
          <span class="score-display" id="ai-score">0</span>
        </div>
      </div>
      <div class="game-container">
        <canvas id="ai-canvas" class="game-canvas"></canvas>
        <div class="game-over-overlay" id="ai-game-over">
          <h2>GAME OVER</h2>
          <p class="final-score">점수: 0</p>
          <button class="restart-btn" onclick="location.reload()">다시 시작</button>
        </div>
      </div>
    </div>
  </div>

  <div class="controls-info">
    조작: <kbd>Q</kbd> 왼쪽 회전 / <kbd>E</kbd> 오른쪽 회전
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
