<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Helix Jump - Human vs AI</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;700&family=Orbitron:wght@600;800&display=swap');

    :root {
      --bg: #eef3f8;
      --panel: rgba(255, 255, 255, 0.9);
      --panel-border: rgba(40, 56, 78, 0.14);
      --text: #1f2937;
      --muted: #4b5563;
      --human: #1fa463;
      --ai: #157fe3;
      --danger: #cf2847;
      --shadow-lg: 0 20px 45px rgba(16, 24, 40, 0.18);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background:
        radial-gradient(1200px 800px at 12% -18%, rgba(27, 152, 224, 0.21), transparent 60%),
        radial-gradient(1000px 650px at 88% 116%, rgba(18, 185, 129, 0.19), transparent 56%),
        linear-gradient(160deg, #edf2f7 0%, #dbe7f3 46%, #f3f7fb 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Chakra Petch', 'Noto Sans KR', sans-serif;
      overflow: auto;
      padding: 16px;
      position: relative;
      isolation: isolate;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      opacity: 0.2;
      background-image:
        linear-gradient(rgba(31, 41, 55, 0.15) 1px, transparent 1px),
        linear-gradient(90deg, rgba(31, 41, 55, 0.15) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    .reset-darken-overlay {
      position: fixed;
      inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      z-index: 900;
      transition: opacity 0.2s linear;
    }

    #app-shell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: min(96vw, 900px);
    }

    .app-logo {
      display: block;
      width: min(21vw, 126px);
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 6px 16px rgba(0, 0, 0, 0.18));
    }

    .app-brandline {
      margin-top: -2px;
      letter-spacing: 0.22em;
      font-size: 12px;
      font-family: 'Orbitron', 'Chakra Petch', sans-serif;
      text-transform: uppercase;
      color: rgba(31, 41, 55, 0.74);
    }

    #main-container {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    .game-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      padding: 15px 20px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.97), rgba(247, 250, 253, 0.88));
      border-radius: 12px 12px 0 0;
      border: 1px solid var(--panel-border);
      box-shadow: 0 9px 24px rgba(17, 24, 39, 0.12);
      z-index: 10;
    }

    .player-label {
      font-size: 21px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-family: 'Orbitron', 'Chakra Petch', sans-serif;
    }

    .score-box {
      background: #f9fbfd;
      padding: 10px 20px;
      border-radius: 12px;
      box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.05);
      border: 2px solid rgba(148, 163, 184, 0.28);
      display: flex;
      justify-content: center;
      align-items: center;
      min-width: 100px;
      height: 80px;
      transition: all 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .score-display {
      font-size: 48px;
      font-weight: 900;
      color: var(--text);
      line-height: 1;
      font-family: 'Orbitron', 'Chakra Petch', sans-serif;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.95);
    }

    @keyframes leadPulseHuman {
      0% { transform: scale(1.14); box-shadow: 0 10px 20px rgba(31, 164, 99, 0.2); }
      50% { transform: scale(1.2); box-shadow: 0 12px 30px rgba(31, 164, 99, 0.38); }
      100% { transform: scale(1.14); box-shadow: 0 10px 20px rgba(31, 164, 99, 0.2); }
    }

    @keyframes leadPulseAI {
      0% { transform: scale(1.14); box-shadow: 0 10px 20px rgba(21, 127, 227, 0.2); }
      50% { transform: scale(1.2); box-shadow: 0 12px 30px rgba(21, 127, 227, 0.38); }
      100% { transform: scale(1.14); box-shadow: 0 10px 20px rgba(21, 127, 227, 0.2); }
    }

    .player-label.human {
      color: var(--human);
    }

    .player-label.ai {
      color: var(--ai);
    }

    .score-box.human-lead {
      border-color: var(--human);
      background: linear-gradient(180deg, #e6f8ee 0%, #ddf4e7 100%);
      animation: leadPulseHuman 1.3s ease-in-out infinite;
    }

    .score-box.ai-lead {
      border-color: var(--ai);
      background: linear-gradient(180deg, #e5f1ff 0%, #d9ecff 100%);
      animation: leadPulseAI 1.3s ease-in-out infinite;
    }

    .score-box.losing {
      transform: scale(0.8);
      opacity: 0.7;
      background: #fafafa;
    }

    .score-box.trap-hit {
      border-color: #d11f37;
      background: linear-gradient(180deg, #ffd9df 0%, #ffc2cc 100%);
      color: #8a1021;
      transform: scale(1.08);
      box-shadow: 0 12px 30px rgba(209, 31, 55, 0.36);
      animation: none;
      opacity: 1;
    }

    .game-container {
      width: 400px;
      height: 500px;
    }

    .game-canvas {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 0 0 8px 8px;
      border: 1px solid rgba(47, 72, 105, 0.18);
      box-shadow: var(--shadow-lg);
    }

    .round-status {
      width: 100%;
      max-width: 820px;
      display: flex;
      gap: 20px;
      align-items: stretch;
    }

    .game-status-card {
      flex: 1;
      display: none;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(244, 248, 252, 0.94));
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      padding: 16px 18px;
      box-shadow: 0 12px 28px rgba(17, 24, 39, 0.14);
      transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
    }

    .game-status-card.state-win {
      border-color: rgba(14, 165, 233, 0.45);
      background: linear-gradient(180deg, rgba(232, 246, 255, 0.97), rgba(221, 240, 255, 0.95));
      box-shadow: 0 14px 34px rgba(14, 165, 233, 0.18);
      transform: translateY(-2px);
    }

    .game-status-card.state-win h2 {
      color: #0369a1;
    }

    .game-status-card.state-lose {
      border-color: rgba(220, 38, 38, 0.4);
      background: linear-gradient(180deg, rgba(255, 236, 236, 0.98), rgba(255, 224, 224, 0.95));
      box-shadow: 0 14px 34px rgba(220, 38, 38, 0.16);
    }

    .game-status-card.state-lose h2 {
      color: #b91c1c;
    }

    .game-status-card h2 {
      font-size: 22px;
      color: var(--danger);
      margin-bottom: 8px;
    }

    .game-status-card .final-score {
      font-size: 16px;
      color: var(--text);
      font-weight: 700;
    }

    .controls-info {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-family: 'Orbitron', 'Chakra Petch', sans-serif;
    }

    .controls-info kbd {
      background: var(--text);
      color: #fff;
      padding: 4px 10px;
      border-radius: 4px;
      font-family: monospace;
      margin: 0 2px;
    }

    .start-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(900px 500px at 25% 20%, rgba(21, 127, 227, 0.18), transparent 62%),
        radial-gradient(700px 400px at 75% 78%, rgba(31, 164, 99, 0.16), transparent 60%),
        rgba(245, 249, 253, 0.96);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .start-screen h1 {
      font-size: 48px;
      color: var(--text);
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-family: 'Orbitron', 'Chakra Petch', sans-serif;
    }

    .start-controls {
      width: 320px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 30px;
    }

    .difficulty-control {
      width: 100%;
      text-align: center;
    }

    .difficulty-control label {
      display: block;
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #555;
    }

    .difficulty-control input[type="range"] {
      width: 100%;
      margin-bottom: 5px;
    }

    .difficulty-labels {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      color: #888;
    }

    .start-btn {
      background: linear-gradient(135deg, #157fe3, #22b8cf);
      border: none;
      color: white;
      padding: 15px 40px;
      font-size: 24px;
      font-weight: bold;
      border-radius: 30px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 8px 22px rgba(21, 127, 227, 0.32);
    }

    .start-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 20px rgba(33, 150, 243, 0.4);
    }

    @media (max-width: 900px) {
      #main-container {
        flex-direction: column;
      }

      .round-status {
        flex-direction: column;
      }

      .game-container {
        width: min(92vw, 400px);
        height: min(115vw, 500px);
      }
    }
  </style>
</head>

<body>
  <div id="start-screen" class="start-screen">
    <h1>HELIX JUMP VS</h1>
    <div class="start-controls">
      <div class="difficulty-control">
        <label for="ai-difficulty">AI Difficulty: <span id="difficulty-value">50</span></label>
        <input type="range" id="ai-difficulty" min="0" max="100" value="50">
        <div class="difficulty-labels">
          <span>Easy (Slow)</span>
          <span>Hard (Fast)</span>
        </div>
      </div>
      <div class="difficulty-control">
        <label for="score-gap-threshold">Match End Gap: <span id="score-gap-value">5</span></label>
        <input type="range" id="score-gap-threshold" min="4" max="10" step="1" value="5">
        <div class="difficulty-labels">
          <span>4</span>
          <span>10</span>
        </div>
      </div>
    </div>
    <button id="start-btn" class="start-btn">GAME START</button>
  </div>
  <div id="reset-darken-overlay" class="reset-darken-overlay"></div>

  <div id="app-shell">
    <img class="app-logo" src="/src/data/logo.png" alt="Helix Jump Logo" />
    <div class="app-brandline">Head To Head Gravity Match</div>

    <div id="main-container">
      <div class="game-wrapper">
        <div class="game-header">
          <span class="player-label human">Human</span>
          <div class="score-box" id="human-score-box">
            <span class="score-display" id="human-score">0</span>
          </div>
        </div>
        <div class="game-container">
          <canvas id="human-canvas" class="game-canvas"></canvas>
        </div>
      </div>

      <div class="game-wrapper">
        <div class="game-header">
          <span class="player-label ai">AI</span>
          <div class="score-box" id="ai-score-box">
            <span class="score-display" id="ai-score">0</span>
          </div>
        </div>
        <div class="game-container">
          <canvas id="ai-canvas" class="game-canvas"></canvas>
        </div>
      </div>
    </div>

    <section id="round-status" class="round-status">
      <div id="human-game-over" class="game-status-card">
        <h2>ROUND END</h2>
        <p class="final-score">Score: 0</p>
      </div>
      <div id="ai-game-over" class="game-status-card">
        <h2>ROUND END</h2>
        <p class="final-score">Score: 0</p>
      </div>
    </section>

    <div class="controls-info">
      Controls: <kbd>Q</kbd> rotate left / <kbd>E</kbd> rotate right | Game Over Reset: Q-E-Q-E-Q-E
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
